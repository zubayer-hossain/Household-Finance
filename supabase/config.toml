# Supabase local configuration — minimal starter.
# Aligns with CLI defaults; tune for deployment as needed.

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true

[storage]
enabled = true
